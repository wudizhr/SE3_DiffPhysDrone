env:
  single: true
  speed_mtp: 2
  ground_voxels: true
  ceiling: false
  ceiling_height: 6.0
  random_rotation: true
  cam_angle: 20
  fov_x_half_tan: 0.82
  quad_mass: 1.0
  quad_mass_randomization: 0.05
  ctbr_body_rate_limit: 8.0
  ctbr_thrust_min: 0.0
  ctbr_thrust_max: 30.0
  ctbr_omega_time_constant: 0.03
  ctbr_thrust_time_constant: 0.05
  ctbr_linear_drag: 0.05

  gap: true
  gap_prob: 0.1

  n_balls: 10
  n_cyl: 10
  n_cyl_h: 1
  n_ground_voxels: 5
  n_voxels: 10

train:
  num_envs: 32
  num_iters: 50000
  timesteps: 100
  yaw_drift: true
  use_future_collision_samples: false
  lr: 0.0001
    

inference:
  yaw_target_correction: true
  ctl_freq: 10

loss:
  terms:
    action_l2:
      enabled: false
      weight: 0.01
    collision:
      enabled: true
      weight: 5
      curriculum:
        end_iter: 50000
        end_weight: 5.0
        start_iter: 5500
        start_weight: 0.01
    object_avoidance:
      enabled: true
      weight: 1.0
      curriculum:
        end_iter: 50000
        end_weight: 1.0
        start_iter: 5500
        start_weight: 0.01
    jerk:
      enabled: true
      weight: 0.01
    target_yaw_alignment:
      enabled: true
      weight: 3.0
    ctbr_smoothness:
      enabled: true
      weight: 0.5
    thrust_regularization:
      enabled: true
      weight: 1.0
    velocity_tracking:
      enabled: true
      weight: 1.0

sensor:
  name: mid360
  use_odom: true
  mid360_points_per_scan: 1440
  mid360_vertical_channels: 12
  mid360_min_range: 0.1
  mid360_max_range: 50.0
  mid360_vertical_min_deg: -7.0
  mid360_vertical_max_deg: 52.0
  mid360_theta_min_deg: -90.0
  mid360_theta_max_deg: 90.0
  mid360_phi_min_deg: 38.0
  mid360_phi_max_deg: 97.0
  mid360_theta_resolution_deg: 3.0
  mid360_phi_resolution_deg: 5.0
  mid360_encoding: pseudo_image

model:
  name: mid360_se3_model
  dim_obs: 16
  dim_action: 4
  backend_name: ctbr
  action_mode: ctbr
